spring.application.name=SpringBootIntern


# Use environment variable for datasource URL, with fallback to localhost
spring.datasource.url=${JDBC_URL:jdbc:postgresql://localhost:5431/intern_db}
spring.datasource.username=${JDBC_USERNAME:postgres}
spring.datasource.password=${JDBC_PASSWORD:mysecretpassword}


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.port=${SERVER_PORT:8081}
